<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head">

</head>
<body>
	<nav th:replace="fragments/navbar :: navbar"></nav>

	<div class="container">
		<center>

			<form th:action="@{/deneme/sinava}" th:object="${deneme}"
				method="post">

				<div th:object="${deneme}">

					<div class="row">

						<p class="card-text" th:text="${deneme.sorular[1].soru.qtext}"></p>

						<ul>
							<li th:each="cevaplar: ${deneme.sorular[1].cevaplar}"><input
								type="checkbox" th:field="${deneme.sorular[1].kullanıcıcevabıo}"
								th:value="${cevaplar.id}" /> <label th:text="${cevaplar.atext}"></label></li>
						</ul>
						<button class="btn btn-primary" type="submit">next</button>

					</div>




				</div>

				<div th:object="${deneme}">
					<div th:each="sorular: ${deneme.sorular}">

						<p th:text="${sorular.soru.qtext}"></p>

						<ul>
							<li th:each="cevaplar: ${sorular.cevaplar}"><label
								th:text="${cevaplar.atext}"></label></li>
						</ul>



					</div>
				</div>


			</form>



		</center>

	</div>


</body>
</html>
